# ==============================================================================
# server.cfg — FiveM Local Server Configuration
# ==============================================================================

# ── Server identity ────────────────────────────────────────────────────────────
sv_hostname "My FiveM Server"
sv_projectName "MyServer"
sv_projectDesc "Serveur FiveM local — développement"

# ── Network ────────────────────────────────────────────────────────────────────
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"

# ── Slots ──────────────────────────────────────────────────────────────────────
sv_maxclients 32

# ── License key (required for public server, leave empty for local LAN) ────────
# sv_licenseKey "your_license_key_here"

# ── Database connection (oxmysql) ──────────────────────────────────────────────
# Format: mysql://user:password@host/database?charset=utf8mb4
set mysql_connection_string "mysql://root:password@localhost/fivem_server?charset=utf8mb4"

# ── Steam / OneSync ────────────────────────────────────────────────────────────
# set steam_webApiKey "your_steam_api_key"
set onesync "on"

# ── Convars (shared with clients) ─────────────────────────────────────────────
setr game_type "Roleplay"
setr locale "fr-FR"

# ── ACE permissions ────────────────────────────────────────────────────────────
add_ace group.admin command allow
add_ace group.admin command.quit allow
add_principal identifier.steam:110000100000000 group.admin   # Replace with your Steam hex

# ── Resources — load order ─────────────────────────────────────────────────────

# Base / infrastructure (must be first — other resources depend on it)
ensure oxmysql

# Core gameplay
ensure player_manager    # Player registration & data
ensure inventory         # Inventory system

# Standalone utilities
ensure spawnmanager      # Spawn manager — position save/restore

# [amine] — custom server resources
ensure chat              # Système de chat (commandes /me /ooc /help)
ensure hardcap           # Protection anti-surcharge
ensure basicneeds        # Faim / soif
ensure money             # Argent liquide et bancaire
