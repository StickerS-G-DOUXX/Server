# ==============================================================================
# server.cfg — FiveM Server Configuration
# ==============================================================================

# Only change the IP if you're using a server with multiple network interfaces, otherwise change the port only.
endpoint_add_tcp "0.0.0.0:31120"
endpoint_add_udp "0.0.0.0:31120"

# MySQL
set mysql_connection_string "server=127.0.0.1;uid=root;password=;database=vision"
set mysql_slow_query_warning 5000

setr server "DEV"

mysql_debug true

# These resources will start by default.
#ensure chat
#ensure basic-gamemode #Obligé sinon chargement infini
#ensure hardcap
#ensure rconlog


ensure oxmysql

ensure VUI
ensure aHUD
ensure mx_fixwiring
ensure tuto-fa

ensure emotes

#ensure core
ensure [activities]
ensure wk_wars2x
ensure queue
ensure chat

ensure ContextMenu

ensure deco
ensure core

ensure mth-cutscenes

ensure vNotif
ensure speedometer
ensure utils
ensure pma-voice
stop monitor

# Anti DDOS HTTP/S
set sv_requestParanoia 3
sv_endpointprivacy true
sv_forceIndirectListing true
sv_useDirectListing true
#sv_authMinTrust 4
sv_enforceGameBuild 3095


# This allows players to use scripthook-based plugins such as the legacy Lambda Menu.
# Set this to 1 to allow scripthook. Do note that this does _not_ guarantee players won't be able to use external plugins.
sv_scriptHookAllowed 0

# Uncomment this and set a password to enable RCON. Make sure to change the password - it should look like rcon_password "YOURPASSWORD"
#rcon_password ""

# A comma-separated list of tags for your server.
# For example:
# - sets tags "drifting, cars, racing"
# Or:
# - sets tags "roleplay, military, tanks"
sets tags "Dev, SEB, Amine"

# A valid locale identifier for your server's primary language.
# For example "en-US", "fr-CA", "nl-NL", "de-DE", "en-GB", "pt-BR"
sets locale "fr-FR"
# please DO replace root-AQ on the line ABOVE with a real language! :)

# Set an optional server info and connecting banner image url.
# Size doesn't matter, any banner sized image will be fine.
#sets banner_detail "https://url.to/image.png"
#sets banner_connecting "https://url.to/image.png"

# Set your server's hostname. This is not usually shown anywhere in listings.
sv_hostname "SEB - OFFICIAL"
set sv_projectName "SEB - OFFICIAL"
set sv_projectDesc "https://discord.gg/qhUsVWzBz6"

# Nested configs!
#exec server_internal.cfg

# Loading a server icon (96x96 PNG file)
load_server_icon LSSD_SEB_Flag.png

# convars which can be used in scripts
#set temp_convar "hey world!"

# Remove the `#` from the below line if you want your server to be listed as 'private' in the server browser.
# Do not edit it if you *do not* want your server listed as 'private'.
# Check the following url for more detailed information about this:
# https://docs.fivem.net/docs/server-manual/server-commands/#sv_master1-newvalue
#sv_master1 ""

#add_principal identifier.license:2d74177955920fe1366d4cd9b4e6a9f5d95dca14 group.admin

add_ace resource.rcore_whiteboard command.add_ace allow
add_ace resource.rcore_whiteboard command.add_principal allow
add_ace resource.rcore_whiteboard command.remove_ace allow
add_ace resource.rcore_whiteboard command.remove_principal allow

add_ace group.moderator command.add_ace allow
add_ace group.moderator command.add_principal allow
add_ace group.moderator command.remove_ace allow
add_ace group.moderator command.remove_principal allow

add_ace group.moderator command.rw_editor allow
add_ace group.admin command.tableau allow

# Add system admins
add_ace group.admin command allow # allow all commands
add_ace group.admin command.quit deny # but don't allow quit
add_principal identifier.fivem:1 group.admin # add the admin to the group


# enable OneSync (required for server-side state awareness)
#set onesync on
#set onesync_enableInfinity 1
#set onesync_population true
#set onesync_forceMigration true
#set onesync_workaround763185 true

set onesync on
set onesync_enableInfinity true
set onesync_forceMigration true
set onesync_workaround763185 true
set onesync_population true

# Server player slot limit (see https://fivem.net/server-hosting for limits)
sv_maxclients 5

# Steam Web API key, if you want to use Steam authentication (https://steamcommunity.com/dev/apikey)
# -> replace "" with the key
set steam_webApiKey "none"
# sv_licenseKey "your_license_key_here"
