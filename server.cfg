# ==============================================================================
# server.cfg — FiveM Server Configuration
# ==============================================================================

# Only change the IP if you're using a server with multiple network interfaces, otherwise change the port only.
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"

# MySQL connection — use a dedicated database user (not root) with limited privileges
set mysql_connection_string "mysql://fivem_user:YOUR_PASSWORD@localhost/fivem_server?charset=utf8mb4"
set mysql_slow_query_warning 150

# ==============================================================================
# Resources
# ==============================================================================

# Base — must start first
ensure oxmysql

# Amine resources
ensure [amine]

# Core systems
ensure player_manager
ensure inventory

# Standalone utilities
ensure spawnmanager

# ==============================================================================
# Server settings
# ==============================================================================

sv_scriptHookAllowed 0

# Uncomment and set a password to enable RCON
#rcon_password ""

sets tags "roleplay, fivem"
sets locale "fr-FR"

sv_hostname "FiveM Server"
set sv_projectName "FiveM Server"
set sv_projectDesc ""

# Server player slot limit (see https://fivem.net/server-hosting for limits)
sv_maxclients 32

# Anti DDoS / privacy
set sv_requestParanoia 3
sv_endpointprivacy true
sv_forceIndirectListing true
sv_useDirectListing true
sv_enforceGameBuild 3258

# Steam Web API key (https://steamcommunity.com/dev/apikey)
set steam_webApiKey "none"

# License key — uncomment and set if you want your server to be publicly listed
set sv_licenseKey "cfxk_1az9vyxLvuBeGohn8Fmhr_278TCN"

# ==============================================================================
# OneSync (required for server-side state awareness)
# ==============================================================================

set onesync on
set onesync_enableInfinity true
set onesync_forceMigration true
set onesync_workaround763185 true
set onesync_population true

# ==============================================================================
# ACE permissions
# ==============================================================================

# Add system admins
add_ace group.admin command allow
add_ace group.admin command.quit deny
add_principal identifier.fivem:1 group.admin
